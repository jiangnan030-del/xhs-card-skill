<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>xhs-card-skill GitHub Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 600px;
    overflow: hidden;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  }
  .cover {
    width: 1200px;
    height: 600px;
    position: relative;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    overflow: hidden;
  }

  /* 背景装饰 */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(76, 110, 245, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(76, 110, 245, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .bg-glow-1 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(76, 110, 245, 0.25) 0%, transparent 70%);
    top: -150px;
    right: -100px;
  }
  .bg-glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 46, 77, 0.15) 0%, transparent 70%);
    bottom: -120px;
    left: -80px;
  }
  .bg-glow-3 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(12, 166, 120, 0.12) 0%, transparent 70%);
    top: 200px;
    left: 300px;
  }

  /* 卡片装饰元素 */
  .card-deco {
    position: absolute;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }
  .card-deco-1 {
    width: 200px;
    height: 260px;
    top: 60px;
    right: 80px;
    background: linear-gradient(145deg, rgba(76, 110, 245, 0.15), rgba(76, 110, 245, 0.05));
    transform: rotate(3deg);
  }
  .card-deco-2 {
    width: 180px;
    height: 240px;
    top: 140px;
    right: 250px;
    background: linear-gradient(145deg, rgba(255, 46, 77, 0.12), rgba(255, 46, 77, 0.04));
    transform: rotate(-4deg);
  }
  .card-deco-3 {
    width: 160px;
    height: 210px;
    bottom: 60px;
    right: 140px;
    background: linear-gradient(145deg, rgba(12, 166, 120, 0.12), rgba(12, 166, 120, 0.04));
    transform: rotate(2deg);
  }

  /* 卡片内部装饰 */
  .deco-line {
    position: absolute;
    left: 20px;
    right: 20px;
    height: 3px;
    border-radius: 2px;
  }
  .card-deco-1 .deco-line:nth-child(1) { top: 24px; background: #4C6EF5; }
  .card-deco-1 .deco-line:nth-child(2) { top: 32px; background: rgba(76,110,245,0.3); }
  .card-deco-2 .deco-line { top: 20px; background: #FF2E4D; }
  .card-deco-3 .deco-line { top: 18px; background: #0CA678; }

  .deco-circle {
    position: absolute;
    bottom: 24px;
    left: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: white;
    font-weight: 700;
  }
  .card-deco-1 .deco-circle { background: #4C6EF5; }
  .card-deco-2 .deco-circle { background: #FF2E4D; }
  .card-deco-3 .deco-circle { background: #0CA678; }

  /* 主内容区 */
  .content {
    position: absolute;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
  }

  /* 标签（带内嵌 logo） */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(76, 110, 245, 0.2);
    border: 1px solid rgba(76, 110, 245, 0.4);
    padding: 12px 24px;
    border-radius: 30px;
    margin-bottom: 32px;
  }
  .badge-logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #4C6EF5, #FF2E4D);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .badge-text {
    font-size: 18px;
    font-weight: 700;
    color: #a8b8ff;
    letter-spacing: 1.5px;
  }
  .badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4C6EF5;
    box-shadow: 0 0 10px #4C6EF5;
    flex-shrink: 0;
  }

  /* 主标题 */
  .title {
    font-size: 72px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-bottom: 20px;
  }
  .title-accent {
    background: linear-gradient(135deg, #4C6EF5, #FF2E4D);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* 副标题 */
  .subtitle {
    font-size: 28px;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    max-width: 520px;
    margin-bottom: 36px;
  }

  /* 特性标签组 */
  .features {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    max-width: 560px;
  }
  .feature-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 600;
  }
  .feature-tag-blue { background: rgba(76, 110, 245, 0.18); color: #8faaff; border: 1px solid rgba(76, 110, 245, 0.25); }
  .feature-tag-red { background: rgba(255, 46, 77, 0.15); color: #ff8a9e; border: 1px solid rgba(255, 46, 77, 0.2); }
  .feature-tag-green { background: rgba(12, 166, 120, 0.15); color: #5ed4a8; border: 1px solid rgba(12, 166, 120, 0.2); }
  .feature-tag-purple { background: rgba(132, 94, 247, 0.15); color: #b8a0ff; border: 1px solid rgba(132, 94, 247, 0.2); }
  .feature-tag-orange { background: rgba(245, 159, 0, 0.15); color: #ffc066; border: 1px solid rgba(245, 159, 0, 0.2); }

  /* 右下角版本号 */
  .version {
    position: absolute;
    bottom: 32px;
    right: 40px;
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
    z-index: 10;
  }

  /* 装饰数字 */
  .stat-number {
    position: absolute;
    font-size: 120px;
    font-weight: 900;
    color: rgba(255,255,255,0.03);
    line-height: 1;
    z-index: 1;
  }
  .stat-1 { top: -10px; left: 420px; }
  .stat-2 { bottom: -20px; left: 200px; }
</style>
</head>
<body>
<div class="cover">

  <!-- 背景 -->
  <div class="bg-grid"></div>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>
  <div class="bg-glow-3"></div>

  <!-- 装饰数字 -->
  <div class="stat-number stat-1">7</div>
  <div class="stat-number stat-2">3:4</div>

  <!-- 主内容 -->
  <div class="content">
    <!-- Badge：Logo + 文字 + 圆点 整合在一起，避免重叠 -->
    <div class="badge">
      <span class="badge-logo">📇</span>
      <span class="badge-text">xhs-card-skill</span>
      <span class="badge-dot"></span>
      <span style="color:rgba(255,255,255,0.45);font-size:16px;font-weight:500;">XIAOHONGSHU CARD SKILL</span>
    </div>

    <h1 class="title">
      小红书图文卡片<br>
      <span class="title-accent">一键排版 Skill</span>
    </h1>

    <p class="subtitle">
      把 Markdown 排成 3:4 图文卡组<br>
      封面 · 内容页 · 结尾页 → 导出 PNG 直接发布
    </p>

    <div class="features">
      <span class="feature-tag feature-blue">🎨 6 套主题</span>
      <span class="feature-tag feature-red">📐 3:4 卡片</span>
      <span class="feature-tag feature-green">✅ 三关校验</span>
      <span class="feature-tag feature-purple">🤖 AI 驱动</span>
      <span class="feature-tag feature-orange">📦 PNG 导出</span>
    </div>
  </div>

  <!-- 右侧装饰卡片 -->
  <div class="card-deco card-deco-1">
    <div class="deco-line"></div>
    <div class="deco-line"></div>
    <div class="deco-circle">📌</div>
  </div>
  <div class="card-deco card-deco-2">
    <div class="deco-line"></div>
    <div class="deco-circle">✍️</div>
  </div>
  <div class="card-deco card-deco-3">
    <div class="deco-line"></div>
    <div class="deco-circle">🚀</div>
  </div>

  <!-- 版本 -->
  <div class="version">v0.1.0 · AGPL-3.0 License</div>

</div>
</body>
</html>
